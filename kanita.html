
<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; margin: 0; }
        .kontejner { position: relative; width: 300px; height: 400px; cursor: pointer; }
        .zarf { width: 100%; height: 100%; background: #5d0f28; transition: transform 0.6s; }
        .ftesa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; padding: 20px; box-sizing: border-box; opacity: 0; transition: opacity 0.5s; text-align: center; }
        .hapur .zarf { transform: rotateX(-180deg); }
        .hapur .ftesa { opacity: 1; }
        .btn { display: block; margin-top: 20px; padding: 10px; background: #5d0f28; color: white; text-decoration: none; }
    </style>
</head>
<body>

<div class="kontejner" onclick="this.classList.toggle('hapur')">
    <div class="zarf">
        <!-- Këtu vendos imazhin e zarfit (p.sh. image.png) -->
        <div class="vula">Kliko për të hapur</div>
    </div>
    <div class="ftesa">
        <h2>Ranitas Henna</h2>
        <p>Jeni të ftuar në natën e Kënës.</p>
        <p>Data: 14/08/26</p>
        <p>Ora: 18:00</p>
        <a href="https://maps.app.goo.gl/yLP6GjYRyUujSBiQ7?g_st=ic" class="btn">Lokacioni i Restorant Korabi</a>
        <a href="tel:+38978651461" class="btn">Konfirmo pjesëmarrjen</a>
    </div>
</div>

</body>
</html>
