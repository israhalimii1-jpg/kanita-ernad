<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ftesë Dasme - Kanita & Ernad</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Alex+Brush&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #f7f5f0; /* Sfondi i hapur ashtu si te imazhi */
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: 'Cormorant Garamond', serif;
    }

    /* SEKSIONI I ZARFIT NAVY */
    .envelope-section {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 10;
        transition: opacity 0.6s ease;
    }

    .envelope-wrapper {
        position: relative;
        width: 330px;
        height: 230px;
        background-color: #16253b; /* Kaltër e errët / Navy */
        cursor: pointer;
        border-radius: 3px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }

    .envelope-flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 165px solid transparent;
        border-right: 165px solid transparent;
        border-top: 130px solid #1f324e; 
        transform-origin: top;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 4;
        filter: drop-shadow(0 4px 5px rgba(0,0,0,0.25));
    }

    .envelope-base {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 165px solid #16253b;
        border-right: 165px solid #16253b;
        border-bottom: 120px solid #0d1827;
        z-index: 3;
    }

    .preview-card {
        position: absolute;
        top: 12px;
        left: 15px;
        width: 300px;
        height: 205px;
        background-color: #fcfbfa;
        z-index: 2;
        border-radius: 2px;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        border: 1px solid #ebdcb9;
    }

    .preview-card span {
        color: #7d644d;
        font-family: 'Cormorant Garamond', serif;
        font-size: 20px;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .wax-seal {
        position: absolute;
        top: 100px; 
        left: 137px;
        width: 56px;
        height: 56px;
        border-radius: 50%; 
        background: radial-gradient(circle at 35% 35%, #f3e1bc, #caa052 65%, #a37932);
        z-index: 5;
        box-shadow: 0 5px 12px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .wax-seal::before {
        content: "E & K"; 
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        font-weight: bold;
        color: #5c4314;
        opacity: 0.7;
        letter-spacing: 0.5px;
    }

    .hint-text {
        position: absolute;
        bottom: -45px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        letter-spacing: 2px;
        color: #59677a;
    }

    .envelope-wrapper.open .envelope-flap {
        transform: rotateX(180deg);
        z-index: 1;
    }

    .envelope-wrapper.open .preview-card {
        transform: translateY(-120px) scale(0.8);
        opacity: 0;
    }

    .envelope-wrapper.open .wax-seal {
        opacity: 0;
        transform: scale(0.8);
        pointer-events: none;
    }

    /* KARTA E PLOTË E FTESËS (Sipas image_6.png) */
    .main-invitation-container {
        width: 100%;
        max-width: 430px;
        display: none; 
        opacity: 0;
        box-sizing: border-box;
        padding: 30px 20px 60px 20px;
        animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .invitation-card {
        width: 100%;
        background-color: #fdfbf7; 
        position: relative;
        padding: 50px 30px;
        box-sizing: border-box;
        border-radius: 2px;
        box-shadow: 0 15px 45px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        border: 1px solid #eeebe3;
    }

    /* Monogrami Floral Qendror i Sipërm */
    .monogram-container {
        width: 140px;
        height: 150px;
        margin-bottom: 25px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #765c48;
    }

    .monogram-frame {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 1px solid #cbbaaa;
        border-radius: 50px 50px 0 0;
        clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 50% 100%, 0% 85%);
    }

    .monogram-text {
        font-size: 26px;
        letter-spacing: 1px;
        line-height: 1.2;
        margin-top: -10px;
        z-index: 2;
        font-weight: 300;
    }

    .monogram-divider {
        width: 35px;
        height: 1px;
        background-color: #cbbaaa;
        margin: 6px 0;
        z-index: 2;
    }

    /* Dekorimi i luleve të skicuara rreth monogramit */
    .monogram-leaves {
        position: absolute;
        bottom: -10px;
        font-size: 28px;
        color: #bfae9e;
        opacity: 0.7;
    }

    /* Emrat Kryesorë */
    .name-heading {
        font-size: 26px;
        letter-spacing: 6px;
        color: #634d3a;
        text-transform: uppercase;
        margin: 15px 0 5px 0;
        font-weight: 400;
    }

    .ampersand-dhe {
        font-family: 'Alex Brush', cursive;
        font-size: 26px;
        color: #8c7662;
        margin: 5px 0;
        font-style: italic;
    }

    /* Teksti i Ri i Ftesës */
