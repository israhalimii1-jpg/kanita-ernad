<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ftesë Dasme - Kanita & Ernad</title>
<style>
    :root {
        --bg-color: #f6f4f0;
        --text-color: #5a4636;
        --navy-envelope: #162238;
        --navy-flap: #1c2d4a;
        --navy-dark: #0b1321;
        --gold-light: #e5c07b;
        --gold-base: #c59b4e;
        --gold-dark: #966f27;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Georgia', serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Seksioni i Zarfit */
    .envelope-section {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .envelope-wrapper {
        position: relative;
        width: 320px;
        height: 220px;
        background: linear-gradient(135deg, var(--navy-envelope), var(--navy-dark));
        box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.1);
        cursor: pointer;
        perspective: 1000px;
        border-radius: 4px;
    }

    /* Flap i Sipërm Realistik (me hije reale) */
    .envelope-wrapper::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-top: 125px solid var(--navy-flap);
        filter: drop-shadow(0 4px 5px rgba(0,0,0,0.3));
        transform-origin: top;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.2s, z-index 0s ease 0.4s;
        z-index: 4;
    }

    /* Pjesa e poshtme dhe anësore e zarfit */
    .envelope-wrapper::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 160px solid rgba(24, 37, 59, 0.98);
        border-right: 160px solid rgba(24, 37, 59, 0.98);
        border-bottom: 115px solid var(--navy-dark);
        filter: drop-shadow(0 -2px 5px rgba(0,0,0,0.15));
        z-index: 3;
        border-radius: 0 0 4px 4px;
    }

    /* Letra që qëndron e fshehur brenda */
    .preview-letter {
        position: absolute;
        top: 12px;
        left: 15px;
        width: 290px;
        height: 195px;
        background-color: var(--bg-color);
        z-index: 2;
        transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 1px solid #e1ded9;
        text-align: center;
        padding: 10px;
        box-sizing: border-box;
    }

    .preview-letter .mini-monogram {
        font-size: 14px;
        letter-spacing: 1px;
        line-height: 1.2;
        margin-bottom: 15px;
        opacity: 0.8;
    }

    .preview-letter h2 {
        font-size: 18px;
        letter-spacing: 4px;
        margin: 2px 0;
        font-weight: normal;
        text-transform: uppercase;
    }

    /* VULA E DYLLIT 3D REALISTIKE (Wax Seal) */
    .wax-seal {
        position: absolute;
        top: 95px;
        left: 135px;
        width: 50px;
        height: 50px;
        /* Formë organike e parregullt si dyll i vërtetë */
        border-radius: 48% 52% 50% 50% / 51% 49% 52% 48%;
        background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-base) 60%, var(--gold-dark));
        z-index: 5;
        box-shadow: 
            0 4px 10px rgba(0,0,0,0.4), 
            inset 0 2px 3px rgba(255,255,255,0.4),
            inset 0 -3px 5px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Unaza e brendshme e shtypur nga vula metalike */
    .wax-seal::before {
        content: "";
        position: absolute;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.15);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 1px 1px rgba(255,255,255,0.2);
    }

    /* Data 3D e gdhendur/gërmuar brenda dyllit (Letterpress Effect) */
    .wax-date {
        font-family: 'Times New Roman', serif;
        font-size: 11px;
        font-weight: bold;
        color: var(--gold-dark);
        z-index: 6;
        letter-spacing: 0.5px;
        /* Kjo krijon efektin magjik të gërmimit 3D */
        text-shadow: 
            -1px -1px 1px rgba(0, 0, 0, 0.4), 
            1px 1px 1px rgba(255, 255, 255, 0.4);
        opacity: 0.9;
    }

    .hint-text {
        position: absolute;
        bottom: -55px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        letter-spacing: 2px;
        color: #8c7a6b;
        animation: blink 1.8s infinite;
    }

    /* Animacionet e Hapjes */
    .envelope-wrapper.open::before {
        transform: rotateX(180deg);
        z-index: 1;
    }

    .envelope-wrapper.open .preview-letter {
        transform: translateY(-160px);
        z-index: 5;
        box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .envelope-wrapper.open .wax-seal {
        opacity: 0;
        transform: scale(0.8);
        pointer-events: none;
    }

    /* SEKSIONI KRYESOR (SHTRIRJA ME SCROLL) */
    .details-section {
        width: 100%;
        max-width: 450px;
        padding: 40px 20px 80px 20px;
        box-sizing: border-box;
        text-align: center;
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 1s ease 1.2s, transform 1s ease 1.2s;
    }

    body.show-content .details-section {
        opacity: 1;
        transform: translateY(0);
    }

    /* STILIMI I TEKSTIT FIKS SI NË FOTO */
    .monogram {
        font-size: 28px;
        letter-spacing: 2px;
        line-height: 1.5;
        margin-bottom: 40px;
        font-weight: normal;
    }

    .line-short {
        width: 40px;
        height: 1px;
        background-color: var(--text-color);
        margin: 5px auto;
    }

    .name {
        font-size: 26px;
        letter-spacing: 6px;
        margin: 0;
        font-weight: normal;
        text-transform: uppercase;
    }

    .and {
        font-style: italic;
        font-size: 18px;
        margin: 15px 0;
        color: #7a6553;
    }

    .main-text {
        font-size: 12px;
        letter-spacing: 3px;
        line-height: 2;
        margin: 40px 0;
        text-transform: uppercase;
    }

    .date-section {
        font-size: 24px;
        letter-spacing: 4px;
        margin: 30px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
    }

    .date-divider {
        color: #7a6553;
    }

    .time-section {
        font-size: 13px;
        letter-spacing: 3px;
        line-height: 1.8;
        margin: 30px 0;
        text-transform: uppercase;
    }

    .venue {
        font-size: 14px;
        letter-spacing: 5px;
        margin-top: 40px;
        text-transform: uppercase;
        font-weight: normal;
    }

    /* Butonat */
    .btn-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        margin-top: 50px;
    }

    .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 85%;
        max-width: 260px;
        padding: 14px 20px;
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 2px;
        font-weight: bold;
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    .maps-btn {
        background: transparent;
        color: var(--text-color);
        border: 1px solid var(--text-color);
    }

    .rsvp-btn {
        background: var(--text-color);
        color: white;
        border: 1px solid var(--text-color);
    }

    @keyframes blink {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
    }
</style>
</head>
<body>

<div class="envelope-section" id="envSection">
    <div class="envelope-wrapper" onclick="openEnvelope()">
        <div class="wax-seal">
            <span class="wax-date">18.08</span>
        </div>
        <div class="preview-letter">
            <div class="mini-monogram">E<br>—<br>K</div>
            <h2>KANITA</h2>
            <h2>ERNAD</h2>
        </div>
        <div class="hint-text" id="hint">Kliko mbi zarf për ta hapur ✨</div>
    </div>
</div>

<div class="details-section">
    
    <div class="monogram">
        E
        <div class="line-short"></div>
        K
    </div>

    <h1 class="name">KANITA</h1>
    <div class="and">the</div>
    <h1 class="name">ERNAD</h1>

    <p class="main-text">JU FTOJMË ME GËZIM<br>NË FESTËN E DASMËS SONË.</p>

    <div class="date-section">
        <span>18</span> <span class="date-divider">|</span> 
        <span>08</span> <span class="date-divider">|</span> 
        <span>26</span>
    </div>
    
    <p class="time-section">
        ARDHJA E TË FTUARVE<br>
        <span style="letter-spacing: 1px;">19:00</span>
    </p>

    <div class="venue">ALIKAS</div>

    <div class="btn-container">
        <a class="action-btn maps-btn" href="https://maps.app.goo.gl/NXuzzyA4ZcH9J64p9?g_st=ic" target="_blank">
            📍 HAP LOKACIONIN NË HARTË
        </a>
        <a class="action-btn rsvp-btn" href="https://wa.me/38970278182?text=Përshëndetje!%20Po%20ju%20shkruaj%20për%20të%20konfirmuar%20pjesëmarrjen%20tonë%20në%20dasmën%20tuaj." target="_blank">
            ✉️ KONFIRMO PJESËMARRJEN
        </a>
    </div>

</div>

<script>
function openEnvelope() {
    document.querySelector('.envelope-wrapper').classList.add('open');
    document.getElementById('hint').style.display = 'none';
    document.body.classList.add('show-content');
    
    // Rrëshqitja e butë poshtë automatikisht drejt ftesës së hapur
    setTimeout(() => {
        window.scrollTo({
            top: 350,
            behavior: 'smooth'
        });
    }, 1400);
}
</script>

</body>
</html>
