<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanita & Ernad</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Georgia', serif;
        background-color: #f6f4f0;
        color: #5a4636;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Seksioni i Zarfit */
    .envelope-section {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .envelope-wrapper {
        position: relative;
        width: 320px;
        height: 220px;
        background-color: #1e2e47; /* Navy Mat si në foto */
        cursor: pointer;
        border-radius: 2px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    /* Flapi Trekëndosh i Sipërm (Saktësisht si në foto) */
    .envelope-wrapper::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-top: 130px solid #243754; 
        transform-origin: top;
        transition: transform 0.5s ease;
        z-index: 4;
        filter: drop-shadow(0 3px 4px rgba(0,0,0,0.2));
    }

    /* Pjesa e poshtme e zarfit */
    .envelope-wrapper::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 160px solid #1e2e47;
        border-right: 160px solid #1e2e47;
        border-bottom: 110px solid #162234;
        z-index: 3;
    }

    /* Letra minimale brenda zarfit */
    .preview-letter {
        position: absolute;
        top: 10px;
        left: 15px;
        width: 290px;
        height: 195px;
        background-color: #f6f4f0;
        z-index: 2;
        transition: transform 0.5s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 1px solid #e1ded9;
        text-align: center;
        box-sizing: border-box;
    }

    .preview-letter h2 {
        font-size: 18px;
        letter-spacing: 4px;
        margin: 2px 0;
        font-weight: normal;
        color: #5a4636;
        text-transform: uppercase;
    }

    .preview-letter .mini-and {
        font-style: italic;
        font-size: 14px;
        margin: 5px 0;
        color: #7a6553;
    }

    /* VULA REALISTIKE E DYLLIT (Gold Wax Seal pa emoji) */
    .wax-seal {
        position: absolute;
        top: 102px; 
        left: 133px;
        width: 54px;
        height: 54px;
        border-radius: 48% 52% 49% 51%; /* Formë organike dylli e shkrirë */
        background: radial-gradient(circle at 35% 35%, #e2bf7d, #c59b4e 70%, #9e7631);
        z-index: 5;
        box-shadow: 
            0 4px 10px rgba(0,0,0,0.35), 
            inset 0 1px 2px rgba(255,255,255,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.25s ease, transform 0.2s ease;
    }

    /* Unaza e brendshme e stampuar (Efekti 3D i shtypjes pa lule fake) */
    .wax-seal::before {
        content: "";
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(140, 102, 33, 0.4);
        background: radial-gradient(circle, rgba(197,155,78,0.2) 0%, rgba(140,102,33,0.3) 100%);
        box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2), 1px 1px 1px rgba(255,255,255,0.2);
    }

    .hint-text {
        position: absolute;
        bottom: -45px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        letter-spacing: 2px;
        color: #8c7a6b;
    }

    /* Efekti i hapjes */
    .envelope-wrapper.open::before {
        transform: rotateX(180deg);
        z-index: 1;
    }

    .envelope-wrapper.open .preview-letter {
        transform: translateY(-145px);
        z-index: 5;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .envelope-wrapper.open .wax-seal {
        opacity: 0;
        pointer-events: none;
        transform: scale(0.9);
    }

    /* Seksioni i ftesës */
    .details-section {
        width: 100%;
        max-width: 450px;
        padding: 40px 20px 80px 20px;
        box-sizing: border-box;
        text-align: center;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    body.show-content .details-section {
        opacity: 1;
    }

    .monogram {
        font-size: 28px;
        letter-spacing: 2px;
        line-height: 1.5;
        margin-bottom: 40px;
        font-weight: normal;
    }

    .line-short {
        width: 40px;
        height: 1px;
        background-color: #5a4636;
        margin: 5px auto;
    }

    .name {
        font-size: 26px;
        letter-spacing: 6px;
        margin: 0;
        font-weight: normal;
        text-transform: uppercase;
    }

    .and {
        font-style: italic;
        font-size: 18px;
        margin: 15px 0;
        color: #7a6553;
    }

    .main-text {
        font-size: 12px;
        letter-spacing: 3px;
        line-height: 2;
        margin: 40px 0;
        text-transform: uppercase;
    }

    .date-section {
        font-size: 24px;
        letter-spacing: 4px;
        margin: 30px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
    }

    .date-divider {
        color: #7a6553;
    }

    .time-section {
        font-size: 13px;
        letter-spacing: 3px;
        line-height: 1.8;
        margin: 30px 0;
        text-transform: uppercase;
    }

    .venue {
        font-size: 14px;
        letter-spacing: 5px;
        margin-top: 40px;
        text-transform: uppercase;
    }

    .btn-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        margin-top: 50px;
    }

    .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 85%;
        max-width: 260px;
        padding: 14px 20px;
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 2px;
        font-weight: bold;
        border-radius: 4px;
    }

    .maps-btn {
        background: transparent;
        color: #5a4636;
        border: 1px solid #5a4636;
    }

    .rsvp-btn {
        background: #5a4636;
        color: white;
        border: 1px solid #5a4636;
    }
</style>
</head>
<body>

<div class="envelope-section" id="envSection">
    <div class="envelope-wrapper" onclick="openEnvelope()">
        <!-- Vula e pastër prej ari me stampim 3D -->
        <div class="wax-seal"></div>
        <div class="preview-letter">
            <h2>KANITA</h2>
            <div class="mini-and">dhe</div>
            <h2>ERNAD</h2>
        </div>
        <div class="hint-text" id="hint">Kliko mbi zarf për ta hapur ✨</div>
    </div>
</div>

<div class="details-section">
    
    <div class="monogram">
        E
        <div class="line-short"></div>
        K
    </div>

    <h1 class="name">KANITA</h1>
    <div class="and">dhe</div>
    <h1 class="name">ERNAD</h1>

    <p class="main-text">JU FTOJMË ME GËZIM<br>NË FESTËN E DASMËS SONË.</p>

    <div class="date-section">
        <span>18</span> <span class="date-divider">|</span> 
        <span>08</span> <span class="date-divider">|</span> 
        <span>26</span>
    </div>
    
    <p class="time-section">
        ARDHJA E TË FTUARVE<br>
        <span style="letter-spacing: 1px;">19:00</span>
    </p>

    <div class="venue">ALIKAS</div>

    <div class="btn-container">
        <a class="action-btn maps-btn" href="https://maps.app.goo.gl/NXuzzyA4ZcH9J64p9?g_st=ic" target="_blank">
            📍 HAP LOKACIONIN NË HARTË
        </a>
        <a class="action-btn rsvp-btn" href="https://wa.me/38970278182?text=Përshëndetje!%20Po%20ju%20shkruaj%20për%20të%20konfirmuar%20pjesëmarrjen%20tonë%20në%20dasmën%20tuaj." target="_blank">
            ✉️ KONFIRMO PJESËMARRJEN
        </a>
    </div>

</div>

<script>
function openEnvelope() {
    document.querySelector('.envelope-wrapper').classList.add('open');
    document.getElementById('hint').style.display = 'none';
    document.body.classList.add('show-content');
    
    setTimeout(() => {
        window.scrollTo({
            top: 300,
            behavior: 'smooth'
        });
    }, 800);
}
</script>

</body>
</html>
