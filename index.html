<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanitas Henna</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #e6e2da; 
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: 'Cormorant Garamond', serif;
    }

    /* Seksioni i Zarfit */
    .envelope-section {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 10;
        transition: opacity 0.6s ease;
    }

    .envelope-wrapper {
        position: relative;
        width: 330px;
        height: 230px;
        background-color: #4a1220; 
        cursor: pointer;
        border-radius: 3px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .envelope-flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 165px solid transparent;
        border-right: 165px solid transparent;
        border-top: 130px solid #5c182a; 
        transform-origin: top;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 4;
        filter: drop-shadow(0 4px 5px rgba(0,0,0,0.3));
    }

    .envelope-base {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 165px solid #4a1220;
        border-right: 165px solid #4a1220;
        border-bottom: 120px solid #380b16;
        z-index: 3;
    }

    .preview-card {
        position: absolute;
        top: 12px;
        left: 15px;
        width: 300px;
        height: 205px;
        background-color: #500b1d;
        z-index: 2;
        border-radius: 100px 100px 0 0; 
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
    }

    .preview-card span {
        color: #f1e7d2;
        font-family: 'Great Vibes', cursive;
        font-size: 24px;
        letter-spacing: 1px;
    }

    .wax-seal {
        position: absolute;
        top: 100px; 
        left: 137px;
        width: 56px;
        height: 56px;
        border-radius: 49% 51% 48% 52%; 
        background: radial-gradient(circle at 35% 35%, #e6ca8e, #caa052 65%, #a37932);
        z-index: 5;
        box-shadow: 0 5px 12px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .wax-seal::before {
        content: "🌿"; 
        font-size: 22px;
        opacity: 0.55;
        filter: grayscale(1) sepia(1) hue-rotate(5deg) brightness(0.65);
    }

    .hint-text {
        position: absolute;
        bottom: -45px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        letter-spacing: 2px;
        color: #805c66;
    }

    .envelope-wrapper.open .envelope-flap {
        transform: rotateX(180deg);
        z-index: 1;
    }

    .envelope-wrapper.open .preview-card {
        transform: translateY(-120px) scale(0.8);
        opacity: 0;
    }

    .envelope-wrapper.open .wax-seal {
        opacity: 0;
        transform: scale(0.8);
        pointer-events: none;
    }

    /* KARTA E PLOTË E FTESËS SI NË FOTO */
    .main-invitation-container {
        width: 100%;
        max-width: 400px;
        display: none; 
        opacity: 0;
        box-sizing: border-box;
        padding: 20px 15px 60px 15px;
        animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .invitation-card {
        width: 100%;
        background-color: #dfdacd; 
        position: relative;
        padding: 45px 25px;
        box-sizing: border-box;
        border-radius: 4px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
    }

    .burgundy-arch {
        width: 100%;
        background: linear-gradient(180deg, #4d0b1a 0%, #3a0511 100%);
        border-radius: 160px 160px 0 0; 
        padding: 70px 20px 60px 20px;
        box-sizing: border-box;
        text-align: center;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        color: #f5eedc;
    }

    .flower-accent {
        position: absolute;
        width: 130px;
        height: 130px;
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.95;
        z-index: 5;
    }
    
    .flower-top {
        top: -10px;
        left: -10px;
        transform: rotate(-15deg);
    }
    .flower-bottom {
        bottom: -15px;
        right: -10px;
        transform: rotate(165deg);
    }

    .flower-svg {
        width: 140px;
        height: 140px;
        fill: #f6ebd4;
        filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
    }

    .title-script {
        font-family: 'Great Vibes', cursive;
        font-size: 42px;
        color: #ebdcb9; 
        margin: 0 0 30px 0;
        font-weight: normal;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        letter-spacing: 1px;
    }

    .body-text {
        font-family: 'Cormorant Garamond', serif;
        font-size: 18px;
        line-height: 1.6;
        color: #f1e6cf;
        margin-bottom: 40px;
        font-weight: 300;
    }

    .details-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        color: #ebdcb9;
        margin-bottom: 45px;
        letter-spacing: 1px;
    }

    .icon-box {
        font-size: 20px;
        color: #ebdcb9;
        display: inline-block;
        margin: 0 5px;
    }

    .footer-text {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 19px;
        color: #ebdcb9;
        margin-top: 10px;
        font-weight: 400;
        letter-spacing: 0.5px;
    }

    /* DIZAJNI I BUTONAVE */
    .btn-container {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        width: 100%;
        margin-top: 35px;
    }

    .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 90%;
        max-width: 290px;
        padding: 15px 20px;
        text-decoration: none;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        font-weight: bold;
        border-radius: 3px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .maps-btn {
        background: transparent;
        color: #4a1220;
        border: 1px solid #4a1220;
    }

    .rsvp-btn {
        background: #4a1220;
        color: #fdfbf7;
        border: 1px solid #4a1220;
        box-shadow: 0 5px 15px rgba(74, 18, 32, 0.15);
    }

    .action-btn:active {
        transform: scale(0.98);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>
<body>

<div class="envelope-section" id="envSection">
    <div class="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope-flap"></div>
        <div class="envelope-base"></div>
        <div class="wax-seal"></div>
        
        <div class="preview-card">
            <span>Kanitas Henna</span>
        </div>
        
        <div class="hint-text" id="hint">Kliko mbi zarf për ta hapur ✨</div>
    </div>
</div>

<div class="main-invitation-container" id="invContainer">
    <div class="invitation-card">
        
        <div class="flower-accent flower-top">
            <svg class="flower-svg" viewBox="0 0 100 100">
                <path d="M50,50 C40,30 25,25 35,15 C45,5 50,25 50,50 C50,25 55,5 65,15 C75,25 60,30 50,50 C60,60 75,75 65,85 C55,95 50,75 50,50 C50,75 45,95 35,85 C25,75 40,60 50,50 Z" opacity="0.85"/>
                <circle cx="50" cy="50" r="3" fill="#caa052"/>
            </svg>
        </div>

        <div class="burgundy-arch">
            <h1 class="title-script">Kanitas Henna</h1>
            
            <p class="body-text">
                Një natë dedikuar traditës dhe memories.<br>
                Jeni të ftuar të festojmë bashkë në Natën time<br>
                të Kënës.
            </p>
            
            <div class="details-row">
                <span><span class="icon-box">📍</span> Korabi</span>
                <span style="opacity: 0.5;">|</span>
                <span><span class="icon-box">🕒</span> 18:00</span>
                <span style="opacity: 0.5;">|</span>
                <span><span class="icon-box">📅</span> 14/08/26</span>
            </div>
            
            <p class="footer-text">Prezenca juaj do të na gëzonte shumë</p>
        </div>

        <div class="flower-accent flower-bottom">
            <svg class="flower-svg" viewBox="0 0 100 100">
                <path d="M50,50 C40,30 25,25 35,15 C45,5 50,25 50,50 C50,25 55,5 65,15 C75,25 60,30 50,50 C60,60 75,75 65,85 C55,95 50,75 50,50 C50,75 45,95 35,85 C25,75 40,60 50,50 Z" opacity="0.85"/>
                <circle cx="50" cy="50" r="3" fill="#caa052"/>
            </svg>
        </div>

    </div>

    <!-- BUTONAT E PËRDITËSUAR FUNKSIONALË -->
    <div class="btn-container">
        <!-- Linku i saktë i Google Maps -->
        <a class="action-btn maps-btn" href="https://maps.app.goo.gl/oe3QdvjEYmxXy6WFA?g_st=ic" target="_blank">
            📍 HAP LOKACIONIN NË HARTË
        </a>
        <!-- Numri i ri në WhatsApp me tekst konfirmimi -->
        <a class="action-btn rsvp-btn" href="https://wa.me/38978651461?text=Përshëndetje!%20Konfirmoj%20me%20kënaqësi%20pjesëmarrjen%20në%20Kanitas%20Henna%20✨" target="_blank">
            ✉️ KONFIRMO PJESËMARRJEN
        </a>
    </div>
</div>

<script>
function openEnvelope() {
    document.querySelector('.envelope-wrapper').classList.add('open');
    document.getElementById('hint').style.display = 'none';
    
    setTimeout(() => {
        document.getElementById('envSection').style.display = 'none';
        const invContainer = document.getElementById('invContainer');
        invContainer.style.display = 'block';
        
        setTimeout(() => {
            invContainer.style.opacity = '1';
        }, 50);
    }, 700);
}
</script>

</body>
</html>
